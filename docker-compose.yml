# OpenChatbox — single-service deployment.
#   1) cp .env.example .env  &&  edit AUTH_SECRET
#   2) docker compose up -d --build
# Data (admin account, server config) persists in the named volume below.

services:
  openchatbox:
    image: bohannjein/openchatbox:latest
    build:
      context: .
    container_name: openchatbox
    restart: unless-stopped
    ports:
      # External port is configurable (install.sh sets 6769); internal stays 3000.
      - "${OPENCHATBOX_PORT:-3000}:3000"
    environment:
      # REQUIRED — session signing key. Generate: openssl rand -hex 32
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      NODE_ENV: production
      # Session cookie "Secure" flag. Auto-detected from the request protocol
      # (X-Forwarded-Proto) by default — leave empty for HTTP access on a LAN.
      # Set "true" behind HTTPS, "false" to force plain-HTTP cookies.
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-}
      # Optional SSO (Microsoft Entra / OIDC) — see .env.example.
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID:-}
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID:-}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET:-}
      OIDC_AUTHORIZE_URL: ${OIDC_AUTHORIZE_URL:-}
      OIDC_TOKEN_URL: ${OIDC_TOKEN_URL:-}
    volumes:
      # Runtime state (admin account + config) — lives in the volume, never in
      # the image or git. To store it on a host path instead, set
      # OPENCHATBOX_DATA_DIR and mount that path here.
      - openchatbox-data:/app/data
    # Reach an EXISTING Ollama running on the Docker host — Ollama is NOT
    # bundled/installed by this stack. Set the provider Base URL to
    # http://host.docker.internal:11434 (or your Ollama server's address).
    # For RAM caching, set on that Ollama host: OLLAMA_KEEP_ALIVE=-1,
    # OLLAMA_MAX_LOADED_MODELS, OLLAMA_NUM_PARALLEL.
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  openchatbox-data:
